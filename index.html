<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pendaftaran Skill Contest 2026</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #e3f2fd, #f4f6f8);
}

/* NETWORK */
#network {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
  filter: blur(1.5px);
}

/* CONTENT */
.container {
  position: relative;
  z-index: 2;
  height: 100vh;
  padding: 20px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  backdrop-filter: blur(3px);
  text-align: center;
}

/* LOGO */
.logo {
  height: 150px;
  margin-bottom: 20px;
  animation: floatSmooth 5s ease-in-out infinite;
}

@keyframes floatSmooth {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* BOUNCE */
.logo.bounce {
  animation: bounce 0.6s infinite;
}
.logo.bounce-strong {
  animation: bounceStrong 0.4s infinite;
}

@keyframes bounce {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-18px); }
}

@keyframes bounceStrong {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-30px); }
}

/* COUNTDOWN */
#countdown {
  font-size: 32px;
  font-weight: bold;
  color: #d32f2f;
  letter-spacing: 1px;

  text-shadow:
    0 0 5px rgba(255,215,0,0.9),
    0 0 10px rgba(255,193,7,0.8),
    0 0 20px rgba(255,152,0,0.7),
    0 0 30px rgba(255,215,0,0.6);

  animation: glowPulse 2s ease-in-out infinite;
}

@keyframes glowPulse {
  0% {
    text-shadow:
      0 0 5px rgba(255,215,0,0.6),
      0 0 10px rgba(255,193,7,0.5);
  }
  50% {
    text-shadow:
      0 0 15px rgba(255,215,0,1),
      0 0 30px rgba(255,193,7,0.9),
      0 0 50px rgba(255,152,0,0.8);
  }
  100% {
    text-shadow:
      0 0 5px rgba(255,215,0,0.6),
      0 0 10px rgba(255,193,7,0.5);
  }
}

/* FOOTER */
.footer {
  position: fixed;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  color: #fff;
  background: rgba(0,0,0,0.6);
  padding: 6px 14px;
  border-radius: 8px;
  backdrop-filter: blur(6px);
  opacity: 0;
  transition: 1s;
  z-index: 3;
}
.footer.show { opacity: 1; }

/* RESPONSIVE */
@media (max-width: 768px) {
  .logo { height: 120px; }
  #countdown { font-size: 24px; }
}

@media (max-width: 480px) {
  .logo { height: 90px; }
  #countdown { font-size: 18px; }
  h2 { font-size: 16px; }
  p { font-size: 12px; }
}
</style>
</head>

<body>

<canvas id="network"></canvas>

<div class="container">
  <img class="logo" src="https://www.gayamotor.astra.co.id/images/logo/logo-primary.png">
  <h2>Pendaftaran Skill Contest 2026</h2>
  <p>Pendaftaran akan dibuka dalam:</p>
  <div id="countdown">Loading...</div>
</div>

<p class="footer">Designed by Wahyu (Innovation Committee)</p>

<script>
const target = new Date("2026-03-25T00:00:00+07:00").getTime();
const el = document.getElementById("countdown");
const logo = document.querySelector(".logo");

let redirected = false;

setInterval(()=>{
  let now = Date.now();
  let d = target - now;

  if(d <= 0){
    el.innerHTML = "✅ Pendaftaran telah dibuka!";
    logo.classList.remove("bounce");
    logo.classList.add("bounce-strong");

    if(!redirected){
      redirected = true;
      setTimeout(()=>{
        window.location.href = "https://docs.google.com/forms/d/1FAGzm5Ge-z6QferymjOr19b3LIbRyYb6yb8e8mQz5p4/edit?ts=69c3b15e";
      }, 10000);
    }
    return;
  }

  let dd = Math.floor(d / (1000*60*60*24));
  let hh = Math.floor((d / (1000*60*60)) % 24);
  let mm = Math.floor((d / (1000*60)) % 60);
  let ss = Math.floor((d / 1000) % 60);

  el.innerHTML = `${dd} hari ${hh} jam ${mm} menit ${ss} detik`;

  if(d < 10000){
    logo.classList.add("bounce");
  }

},1000);

/* FOOTER */
setTimeout(()=>{
  document.querySelector(".footer").classList.add("show");
},3000);

/* NETWORK BACKGROUND */
const c = document.getElementById("network");
const ctx = c.getContext("2d");

let w,h,particles=[];

function resize(){
  w = c.width = innerWidth;
  h = c.height = innerHeight;
}
resize();
window.addEventListener("resize", resize);

for(let i=0;i<60;i++){
  particles.push({
    x: Math.random()*w,
    y: Math.random()*h,
    vx:(Math.random()-0.5)*0.4,
    vy:(Math.random()-0.5)*0.4
  });
}

function draw(){
  ctx.clearRect(0,0,w,h);

  particles.forEach((p,i)=>{
    p.x += p.vx;
    p.y += p.vy;

    ctx.beginPath();
    ctx.arc(p.x,p.y,2,0,Math.PI*2);
    ctx.fillStyle="rgba(21,101,192,0.6)";
    ctx.fill();

    for(let j=i+1;j<particles.length;j++){
      let dx=p.x-particles[j].x;
      let dy=p.y-particles[j].y;
      let dist=Math.sqrt(dx*dx+dy*dy);

      if(dist<120){
        ctx.strokeStyle="rgba(21,101,192,0.15)";
        ctx.beginPath();
        ctx.moveTo(p.x,p.y);
        ctx.lineTo(particles[j].x,particles[j].y);
        ctx.stroke();
      }
    }
  });

  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
