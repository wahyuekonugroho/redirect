<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Pendaftaran Skill Contest 2026</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #ffffff;
    }

    /* Canvas background */
    #network {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    /* Content */
    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      backdrop-filter: blur(2px);
    }

    img {
      height: 200px;
      margin-bottom: 20px;
      animation: fadeIn 2s ease-in-out;
    }

    h2 {
      margin-bottom: 10px;
    }

    #countdown {
      font-size: 30px;
      font-weight: bold;
      color: #d32f2f;
      margin: 20px 0;
    }

    a {
      margin-top: 10px;
      color: #1976d2;
      text-decoration: none;
    }

    /* Footer */
    .footer {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(0,0,0,0.5);
      font-size: clamp(8px, 1.5vw, 10px);
      opacity: 0;
      transition: opacity 1s ease;
      z-index: 1;
    }

    .footer.show {
      opacity: 1;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>

<canvas id="network"></canvas>

<div class="container">
  <img src="https://www.gayamotor.astra.co.id/images/logo/logo-primary.png">

  <h2>Pendaftaran Skill Contest 2026</h2>
  <p>Pendaftaran akan dibuka dalam:</p>

  <div id="countdown">Loading...</div>

  <a id="manualLink" href="https://docs.google.com/forms/d/e/1FAIpQLSfhlgr9a9cmngx78u7G1JMut_s-SwvM-edgAMAvkHxe04hM1w/viewform?usp=send_form">
    Klik di sini jika tidak otomatis
  </a>
</div>

<p class="footer">Designed by Wahyu (Innovation Committee)</p>

<script>
/* ================= COUNTDOWN ================= */
const targetDate = new Date("2026-03-30T00:00:00+07:00").getTime();
const countdownElement = document.getElementById("countdown");

function format(n) {
  return n.toString().padStart(2, '0');
}

const interval = setInterval(() => {
  const now = new Date().getTime();
  const distance = targetDate - now;

  if (distance <= 0) {
    clearInterval(interval);
    countdownElement.innerHTML = "✅ Pendaftaran telah dibuka!";

    setTimeout(() => {
      window.location.href = document.getElementById("manualLink").href;
    }, 2000);
    return;
  }

  const d = Math.floor(distance / (1000*60*60*24));
  const h = Math.floor((distance / (1000*60*60)) % 24);
  const m = Math.floor((distance / (1000*60)) % 60);
  const s = Math.floor((distance / 1000) % 60);

  countdownElement.innerHTML =
    format(d)+" hari "+format(h)+" jam "+format(m)+" menit "+format(s)+" detik";
}, 1000);

/* ================= FOOTER DELAY ================= */
setTimeout(() => {
  document.querySelector(".footer").classList.add("show");
}, 3000);

/* ================= NETWORK BACKGROUND ================= */
const canvas = document.getElementById("network");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 60; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: (Math.random() - 0.5) * 0.5,
    vy: (Math.random() - 0.5) * 0.5
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;

    if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

    ctx.beginPath();
    ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.fill();
  });

  for (let i = 0; i < particles.length; i++) {
    for (let j = i; j < particles.length; j++) {
      let dx = particles[i].x - particles[j].x;
      let dy = particles[i].y - particles[j].y;
      let dist = Math.sqrt(dx*dx + dy*dy);

      if (dist < 120) {
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = "rgba(0,0,0,0.05)";
        ctx.stroke();
      }
    }
  }

  requestAnimationFrame(draw);
}

draw();

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
