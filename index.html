<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Pendaftaran Skill Contest 2026</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #ffffff;
    }

    /* Background Canvas */
    #network {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    /* Content */
    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      backdrop-filter: blur(2px);
    }

    img {
      height: 200px;
      margin-bottom: 20px;
      animation: fadeIn 2s ease-in-out;
    }

    h2 {
      margin-bottom: 10px;
    }

    #countdown {
      font-size: 30px;
      font-weight: bold;
      color: #d32f2f;
      margin: 20px 0;
    }

    a {
      margin-top: 10px;
      color: #1976d2;
      text-decoration: none;
    }

    /* Footer */
    .footer {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(0,0,0,0.5);
      font-size: 8px;
      opacity: 0;
      transition: opacity 1s ease;
      z-index: 1;
    }

    .footer.show {
      opacity: 1;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>

<canvas id="network"></canvas>

<div class="container">
  <img src="https://www.gayamotor.astra.co.id/images/logo/logo-primary.png">

  <h2>Pendaftaran Skill Contest 2026</h2>
  <p>Pendaftaran akan dibuka dalam:</p>

  <div id="countdown">Loading...</div>
</div>

<p class="footer">Designed by Wahyu (Innovation Committee)</p>

<script>
/* ================= COUNTDOWN ================= */
const targetDate = new Date("2026-03-30T00:00:00+07:00").getTime();
const countdownElement = document.getElementById("countdown");

function format(n) {
  return n.toString().padStart(2, '0');
}

const interval = setInterval(() => {
  const now = new Date().getTime();
  const distance = targetDate - now;

  if (distance <= 0) {
    clearInterval(interval);
    countdownElement.innerHTML = "✅ Pendaftaran telah dibuka!";

    setTimeout(() => {
      window.location.href = document.getElementById("manualLink").href;
    }, 2000);
    return;
  }

  const d = Math.floor(distance / (1000*60*60*24));
  const h = Math.floor((distance / (1000*60*60)) % 24);
  const m = Math.floor((distance / (1000*60)) % 60);
  const s = Math.floor((distance / 1000) % 60);

  countdownElement.innerHTML =
    format(d)+" hari "+format(h)+" jam "+format(m)+" menit "+format(s)+" detik";
}, 1000);

/* ================= FOOTER ================= */
setTimeout(() => {
  document.querySelector(".footer").classList.add("show");
}, 6000);

/* ================= NETWORK BACKGROUND ================= */
const canvas = document.getElementById("network");
const ctx = canvas.getContext("2d");

let width, height;
let particles = [];
const PARTICLE_COUNT = 80;
const MAX_DISTANCE = 140;

let mouse = { x: null, y: null };

function resize() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

window.addEventListener("mousemove", (e) => {
  mouse.x = e.x;
  mouse.y = e.y;
});

class Particle {
  constructor() {
    this.x = Math.random() * width;
    this.y = Math.random() * height;
    this.vx = (Math.random() - 0.5) * 0.6;
    this.vy = (Math.random() - 0.5) * 0.6;
    this.size = Math.random() * 2 + 1;
  }

  move() {
    this.x += this.vx;
    this.y += this.vy;

    if (this.x <= 0 || this.x >= width) this.vx *= -1;
    if (this.y <= 0 || this.y >= height) this.vy *= -1;
  }

  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(0,0,0,0.25)";
    ctx.fill();
  }
}

for (let i = 0; i < PARTICLE_COUNT; i++) {
  particles.push(new Particle());
}

function connect() {
  for (let a = 0; a < particles.length; a++) {
    for (let b = a + 1; b < particles.length; b++) {
      let dx = particles[a].x - particles[b].x;
      let dy = particles[a].y - particles[b].y;
      let dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < MAX_DISTANCE) {
        let opacity = 1 - dist / MAX_DISTANCE;

        ctx.strokeStyle = "rgba(0,0,0," + (opacity * 0.15) + ")";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(particles[a].x, particles[a].y);
        ctx.lineTo(particles[b].x, particles[b].y);
        ctx.stroke();
      }
    }

    if (mouse.x && mouse.y) {
      let dx = particles[a].x - mouse.x;
      let dy = particles[a].y - mouse.y;
      let dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < MAX_DISTANCE) {
        ctx.strokeStyle = "rgba(0,0,0,0.2)";
        ctx.beginPath();
        ctx.moveTo(particles[a].x, particles[a].y);
        ctx.lineTo(mouse.x, mouse.y);
        ctx.stroke();
      }
    }
  }
}

function animate() {
  ctx.clearRect(0, 0, width, height);

  particles.forEach(p => {
    p.move();
    p.draw();
  });

  connect();

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
