<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Pendaftaran Skill Contest 2026</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #e3f2fd, #f4f6f8);
}

/* CANVAS */
#network {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

/* SVG GEAR */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 1;
  opacity: 0.4;
  pointer-events: none;
}

/* CONTENT */
.container {
  position: relative;
  z-index: 3;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  backdrop-filter: blur(4px);
}

img {
  height: 180px;
  margin-bottom: 20px;
}

/* COUNTDOWN MERAH + GOLD GLOW */
#countdown {
  font-size: 36px;
  font-weight: bold;
  color: #d32f2f;
  letter-spacing: 1px;

  text-shadow:
    0 0 5px rgba(255,215,0,0.8),
    0 0 10px rgba(255,215,0,0.6),
    0 0 20px rgba(255,193,7,0.6),
    0 0 30px rgba(255,152,0,0.5);

  animation: glowPulse 2s infinite ease-in-out;
}

/* PULSE EFFECT */
@keyframes glowPulse {
  0% {
    text-shadow:
      0 0 5px rgba(255,215,0,0.6),
      0 0 10px rgba(255,193,7,0.5);
  }
  50% {
    text-shadow:
      0 0 10px rgba(255,215,0,1),
      0 0 25px rgba(255,193,7,0.9),
      0 0 40px rgba(255,152,0,0.7);
  }
  100% {
    text-shadow:
      0 0 5px rgba(255,215,0,0.6),
      0 0 10px rgba(255,193,7,0.5);
  }
}

/* GEAR ROTATION */
@keyframes cw {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

@keyframes ccw {
  from { transform: rotate(360deg); }
  to { transform: rotate(0deg); }
}

.gear-big {
  transform-origin: center;
  animation: cw 20s linear infinite;
}

.gear-small {
  transform-origin: center;
  animation: ccw 10s linear infinite;
}

.gear-small2 {
  transform-origin: center;
  animation: ccw 12s linear infinite;
}

/* FOOTER */
.footer {
  position: fixed;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 8px;
  opacity: 0;
  transition: 1s;
}

.footer.show {
  opacity: 1;
}
</style>
</head>

<body>

<canvas id="network"></canvas>

<!-- GEAR SYSTEM -->
<svg class="bg" viewBox="0 0 800 600">

  <!-- Gear Besar -->
  <g class="gear-big">
    <circle cx="300" cy="300" r="90" fill="none" stroke="#455a64" stroke-width="12"/>
    <circle cx="300" cy="300" r="35" fill="none" stroke="#90a4ae" stroke-width="5"/>
  </g>

  <!-- Gear Kecil -->
  <g class="gear-small">
    <circle cx="420" cy="300" r="50" fill="none" stroke="#78909c" stroke-width="10"/>
    <circle cx="420" cy="300" r="20" fill="none" stroke="#cfd8dc" stroke-width="4"/>
  </g>

  <!-- Gear tambahan -->
  <g class="gear-small2">
    <circle cx="500" cy="220" r="40" fill="none" stroke="#607d8b" stroke-width="8"/>
    <circle cx="500" cy="220" r="16" fill="none" stroke="#b0bec5" stroke-width="3"/>
  </g>

</svg>

<div class="container">
  <img src="https://www.gayamotor.astra.co.id/images/logo/logo-primary.png">
  <h2>Pendaftaran Skill Contest 2026</h2>
  <p>Pendaftaran akan dibuka dalam:</p>
  <div id="countdown">Loading...</div>
</div>

<p class="footer">Designed by Wahyu (Innovation Committee)</p>

<script>
/* COUNTDOWN */
const target = new Date("2026-03-30T00:00:00+07:00").getTime();
const el = document.getElementById("countdown");

function f(n){ return n.toString().padStart(2,'0'); }

setInterval(()=>{
  let d = target - new Date().getTime();

  if(d<=0){
    el.innerHTML="✅ Pendaftaran telah dibuka!";
    return;
  }

  let dd=Math.floor(d/(1000*60*60*24));
  let hh=Math.floor((d/(1000*60*60))%24);
  let mm=Math.floor((d/(1000*60))%60);
  let ss=Math.floor((d/1000)%60);

  el.innerHTML=`${f(dd)} hari ${f(hh)} jam ${f(mm)} menit ${f(ss)} detik`;
},1000);

/* FOOTER */
setTimeout(()=>{
  document.querySelector(".footer").classList.add("show");
},8000);

/* NETWORK */
const c=document.getElementById("network");
const x=c.getContext("2d");
let w,h,p=[];

function r(){w=c.width=innerWidth;h=c.height=innerHeight;}
r(); addEventListener("resize",r);

for(let i=0;i<60;i++){
  p.push({
    x:Math.random()*w,
    y:Math.random()*h,
    vx:(Math.random()-0.5)*0.4,
    vy:(Math.random()-0.5)*0.4
  });
}

function draw(){
  x.clearRect(0,0,w,h);

  p.forEach(pt=>{
    pt.x+=pt.vx;
    pt.y+=pt.vy;

    x.beginPath();
    x.arc(pt.x,pt.y,2,0,6.28);
    x.fillStyle="rgba(21,101,192,0.8)";
    x.shadowColor="rgba(21,101,192,0.6)";
    x.shadowBlur=10;
    x.fill();
    x.shadowBlur=0;
  });

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
