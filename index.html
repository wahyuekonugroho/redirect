<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pendaftaran Skill Contest 2026</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #e3f2fd, #f4f6f8);
}

/* CANVAS */
#network {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

/* GEAR */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 1;
  opacity: 0.35;
  pointer-events: none;
}

/* CONTENT */
.container {
  position: relative;
  z-index: 3;
  height: 100vh;
  padding: 20px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  backdrop-filter: blur(3px);
}

/* LOGO */
.logo {
  height: 160px;
  margin-bottom: 20px;
  animation: floatSmooth 5s ease-in-out infinite;
}

@keyframes floatSmooth {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* BOUNCE */
.logo.bounce {
  animation: bounce 0.6s infinite;
}
.logo.bounce-strong {
  animation: bounceStrong 0.4s infinite;
}

@keyframes bounce {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-18px); }
}

@keyframes bounceStrong {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-30px); }
}

/* COUNTDOWN MERAH + GOLD GLOW */
#countdown {
  font-size: 32px;
  font-weight: bold;
  color: #d32f2f;
  letter-spacing: 1px;

  text-shadow:
    0 0 5px rgba(255,215,0,0.9),
    0 0 10px rgba(255,193,7,0.8),
    0 0 20px rgba(255,152,0,0.7),
    0 0 30px rgba(255,215,0,0.6);

  animation: goldGlowPulse 2s ease-in-out infinite;
}

/* GLOW ANIMATION */
@keyframes goldGlowPulse {
  0% {
    text-shadow:
      0 0 5px rgba(255,215,0,0.6),
      0 0 10px rgba(255,193,7,0.5);
  }
  50% {
    text-shadow:
      0 0 10px rgba(255,215,0,1),
      0 0 25px rgba(255,193,7,0.9),
      0 0 40px rgba(255,152,0,0.8),
      0 0 60px rgba(255,215,0,0.6);
  }
  100% {
    text-shadow:
      0 0 5px rgba(255,215,0,0.6),
      0 0 10px rgba(255,193,7,0.5);
  }
}

/* GEAR ROTATION */
@keyframes cw { from { transform: rotate(0deg);} to { transform: rotate(360deg);} }
@keyframes ccw { from { transform: rotate(360deg);} to { transform: rotate(0deg);} }

.gear-big { animation: cw 20s linear infinite; }
.gear-small { animation: ccw 10s linear infinite; }
.gear-small2 { animation: ccw 12s linear infinite; }

/* FOOTER */
.footer {
  position: fixed;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 9px;
  color: #263238;
  background: rgba(255,255,255,0.9);
  padding: 4px 10px;
  border-radius: 6px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  opacity: 0;
  transition: 1s;
  z-index: 999;
}
.footer.show { opacity: 1; }

/* RESPONSIVE */
@media (max-width: 768px) {
  .logo { height: 120px; }
  #countdown { font-size: 24px; }
}

@media (max-width: 480px) {
  .logo { height: 90px; }
  #countdown { font-size: 18px; }
  h2 { font-size: 16px; }
  p { font-size: 12px; }
}
</style>
</head>

<body>

<canvas id="network"></canvas>

<!-- GEAR -->
<svg class="bg" viewBox="0 0 800 600">
  <g class="gear-big">
    <circle cx="300" cy="300" r="90" fill="none" stroke="#455a64" stroke-width="12"/>
  </g>
  <g class="gear-small">
    <circle cx="420" cy="300" r="50" fill="none" stroke="#78909c" stroke-width="10"/>
  </g>
  <g class="gear-small2">
    <circle cx="500" cy="220" r="40" fill="none" stroke="#607d8b" stroke-width="8"/>
  </g>
</svg>

<div class="container">
  <img class="logo" src="https://www.gayamotor.astra.co.id/images/logo/logo-primary.png">
  <h2>Pendaftaran Skill Contest 2026</h2>
  <p>Pendaftaran akan dibuka dalam:</p>
  <div id="countdown">Loading...</div>
</div>

<p class="footer">Designed by Wahyu (Innovation Committee)</p>

<!-- SOUND -->
<audio id="gearSound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

<script>
const target = new Date("2026-03-30T00:00:00+07:00").getTime();
const el = document.getElementById("countdown");
const logo = document.querySelector(".logo");
const sound = document.getElementById("gearSound");

/* unlock audio */
document.addEventListener("click", () => {
  sound.play().then(()=>{
    sound.pause();
    sound.currentTime = 0;
  }).catch(()=>{});
}, { once:true });

function playSound(){
  sound.currentTime = 0;
  sound.volume = 0.2;
  sound.play().catch(()=>{});
}

/* COUNTDOWN */
setInterval(()=>{
  let now = new Date().getTime();
  let d = target - now;

  if(d <= 0){
    el.innerHTML = "✅ Pendaftaran telah dibuka!";
    logo.classList.remove("bounce");
    logo.classList.add("bounce-strong");
    playSound();
    return;
  }

  let dd=Math.floor(d/(1000*60*60*24));
  let hh=Math.floor((d/(1000*60*60))%24);
  let mm=Math.floor((d/(1000*60))%60);
  let ss=Math.floor((d/1000)%60);

  el.innerHTML=`${dd} hari ${hh} jam ${mm} menit ${ss} detik`;

  if(d < 10000){
    logo.classList.add("bounce");
  }

  if(d < 5000){
    playSound();
  }

},1000);

/* FOOTER */
setTimeout(()=>{
  document.querySelector(".footer").classList.add("show");
},4000);

/* NETWORK */
const c=document.getElementById("network");
const x=c.getContext("2d");
let w,h,p=[];

function r(){w=c.width=innerWidth;h=c.height=innerHeight;}
r(); addEventListener("resize",r);

for(let i=0;i<50;i++){
  p.push({
    x:Math.random()*w,
    y:Math.random()*h,
    vx:(Math.random()-0.5)*0.3,
    vy:(Math.random()-0.5)*0.3
  });
}

function draw(){
  x.clearRect(0,0,w,h);
  p.forEach(pt=>{
    pt.x+=pt.vx;
    pt.y+=pt.vy;
    x.beginPath();
    x.arc(pt.x,pt.y,2,0,6.28);
    x.fillStyle="rgba(21,101,192,0.7)";
    x.fill();
  });
  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
